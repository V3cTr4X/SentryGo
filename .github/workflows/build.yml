name: Build and Release SentryGo

on:
  push:
    tags:
      - 'v*'   # Solo dispara release en tags que empiecen con vX.Y.Z
  workflow_dispatch:

env:
  GO_VERSION: '1.21'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Server
        run: |
          echo "Building server for ${{ matrix.os }}/${{ matrix.arch }}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o sentrygo-server-${{ matrix.os }}-${{ matrix.arch }} cmd/server/main.go

      - name: Build Agent
        run: |
          echo "Building agent for ${{ matrix.os }}/${{ matrix.arch }}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o sentrygo-agent-${{ matrix.os }}-${{ matrix.arch }} cmd/agent/main.go

      - name: Archive Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sentrygo-binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            sentrygo-server-${{ matrix.os }}-${{ matrix.arch }}
            sentrygo-agent-${{ matrix.os }}-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')  # Solo ejecuta release si es un tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
