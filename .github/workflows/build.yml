name: Build and Release SentryGo

on:
  workflow_dispatch:  # Permite disparar manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    env:
      VERSION: 0.1.0  # Cambia la versión aquí
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build Server
        run: |
          echo "Building server for ${{ matrix.os }}/${{ matrix.arch }}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o sentrygo-server-${{ matrix.os }}-${{ matrix.arch }} cmd/server/main.go

      - name: Build Agent
        run: |
          echo "Building agent for ${{ matrix.os }}/${{ matrix.arch }}"
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o sentrygo-agent-${{ matrix.os }}-${{ matrix.arch }} cmd/agent/main.go

      - name: Archive Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: sentrygo-binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            sentrygo-server-${{ matrix.os }}-${{ matrix.arch }}
            sentrygo-agent-${{ matrix.os }}-${{ matrix.arch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
